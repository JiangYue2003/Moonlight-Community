syntax = "proto3";

package llm;
option go_package = "./llm";

message DescribeReq {
  int64  user_id = 1;
  string body = 2;
  string content = 3;
}

message DescribeResp {
  string description = 1;
}

message QaStreamReq {
  int64 user_id = 1;
  int64 post_id = 2;
  string question = 3;
  int32 top_k = 4;
  int32 max_tokens = 5;
}

message QaChunk {
  string data = 1;
  bool done = 2;
}

service Llm {
  rpc Describe(DescribeReq) returns (DescribeResp);
  rpc QaStream(QaStreamReq) returns (stream QaChunk);
}
