syntax = "proto3";

package storage;
option go_package = "./storage";

message PresignReq {
  int64  user_id      = 1;
  string scene        = 2;
  string post_id      = 3;
  string content_type = 4;
  string ext          = 5;
}

message PresignResp {
  string url         = 1;
  string object_key  = 2;
  int64  expires_in  = 3;
  map<string, string> headers = 4;
  string content_url = 5;
}

service Storage {
  rpc Presign(PresignReq) returns (PresignResp);
}
