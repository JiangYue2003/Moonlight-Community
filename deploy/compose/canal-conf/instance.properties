#################################################
## mysql serverId , v1.0.26+ will autoGen
canal.instance.mysql.slaveId=1234

# enable gtid use true/false
canal.instance.gtidon=false

# position info
canal.instance.master.address=mysql:3306
canal.instance.master.journal.name=
canal.instance.master.position=
canal.instance.master.timestamp=
canal.instance.master.gtid=

# rds oss binlog
canal.instance.rds.accesskey=
canal.instance.rds.secretkey=
canal.instance.rds.instanceId=

# table meta tsdb info
canal.instance.tsdb.enable=true

#canal.instance.standby.address =
#canal.instance.standby.journal.name =
#canal.instance.standby.position =
#canal.instance.standby.timestamp =
#canal.instance.standby.gtid=

# username/password —— 与 db/migrations/000006_canal_user.up.sql 一致
canal.instance.dbUsername=canal
canal.instance.dbPassword=canal
canal.instance.connectionCharset=UTF-8

# enable druid Decode unsigned column meta
canal.instance.enableDruid=false
#canal.instance.pwdPublicKey=...

# 只订阅 zhiguang.outbox 表（阶段3 焦点），其它表的 binlog 都跳过
canal.instance.filter.regex=zhiguang\\.outbox

# table black regex
canal.instance.filter.black.regex=mysql\\.slave_.*

# table field filter(format: schema1.tableName1:field1/field2,schema2.tableName2:field1/field2)
#canal.instance.filter.field=
#canal.instance.filter.black.field=

# instance 级别 mq 覆盖（保持与全局一致即可）
canal.mq.topic=canal-outbox
canal.mq.partitionsNum=6
canal.mq.partitionHash=zhiguang.outbox:id
