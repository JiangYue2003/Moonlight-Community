version: "3.9"

# 知光本地开发依赖一键启动
# 用法：docker compose -f deploy/compose/docker-compose.dev.yml up -d
# 说明：MySQL(3306) 与 Redis(6379) 由宿主机本地进程提供，不在此 compose 中启动
#
# 端口约定（与 services/*/etc/*.yaml 默认值匹配）：
#   Kafka     9092 (PLAINTEXT for host) / 29092 (PLAINTEXT_INTERNAL for containers)
#   ZooKeeper 2181
#   Canal     11111
#   Adminer   8080  (DB Web UI)

services:
  zookeeper:
    # Kafka 3.7 在 ZooKeeper 模式下优先使用 3.8.x 稳定分支
    image: bitnamilegacy/zookeeper:3.8.4
    container_name: zg-zk
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"

  kafka:
    # bitnami/kafka:3.7 标签已下线，改用 bitnamilegacy 可用标签
    image: bitnamilegacy/kafka:3.7.0
    container_name: zg-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      # 双 listener：host 通过 9092 访问；容器内服务通过 29092 走 kafka:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"

  canal-server:
    image: canal/canal-server:v1.1.7
    container_name: zg-canal
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "11111:11111"
    volumes:
      # 自定义 canal.properties 与 instance.properties；只读挂载防意外写入
      - ./canal-conf/canal.properties:/home/admin/canal-server/conf/canal.properties:ro
      - ./canal-conf/instance.properties:/home/admin/canal-server/conf/example/instance.properties:ro
      - zg_canal_logs:/home/admin/canal-server/logs

  adminer:
    image: adminer:4.8.1
    container_name: zg-adminer
    restart: unless-stopped
    ports:
      - "8090:8080"

  elasticsearch:
    image: elasticsearch:9.0.3
    container_name: zg-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - zg_es_data:/usr/share/elasticsearch/data
      # 把宿主 ./es-plugins/analysis-ik 挂为 IK 插件目录（需自行解压对应版本插件）
      - ./es-plugins/analysis-ik:/usr/share/elasticsearch/plugins/analysis-ik:ro
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200 >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 30

  kibana:
    image: kibana:9.0.3
    container_name: zg-kibana
    profiles: ["tools"]
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

volumes:
  zg_canal_logs:
  zg_es_data:
