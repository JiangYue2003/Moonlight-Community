DisableAPI: true

Api:
  Name: search-api
  Host: 0.0.0.0
  Port: 8007

  Mode: dev

  AuthRpc:
    Endpoints:
    - 127.0.0.1:9002
    NonBlock: true

  Es:
    Addrs:
    - http://127.0.0.1:9200
    TimeoutMs: 10000

  ContentIndex: zhiguang_content_index

  Log:
    ServiceName: search-api
    Mode: console
    Level: info

  Prometheus:
    Host: 0.0.0.0
    Port: 9117
    Path: /metrics

Indexer:
  Es:
    Addrs:
    - http://127.0.0.1:9200
    TimeoutMs: 10000

  ContentIndex: zhiguang_content_index

  Kafka:
    Brokers:
    - 127.0.0.1:9092
    Topic: canal-outbox
    GroupId: search-indexer
    AutoOffsetReset: latest

  KnowPostRpc:
    Endpoints:
    - 127.0.0.1:9004
    NonBlock: true

  Redis:
    Host: 127.0.0.1:6379
    Type: node

  Dedup:
    TtlSeconds: 600

  ContentMaxRunes: 4000
  HttpFetchTimeoutMs: 5000

  Log:
    ServiceName: search.indexer
    Mode: console
    Level: info
