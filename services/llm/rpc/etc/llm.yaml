Name: llm.rpc
ListenOn: 0.0.0.0:9018
Etcd:
  Hosts:
  - 127.0.0.1:2379
  Key: llm-rpc

Mode: dev

DeepSeek:
  BaseUrl: https://api.deepseek.com
  ApiKey: "${DEEPSEEK_API_KEY}"
  Model: deepseek-chat
  TimeoutMs: 60000

Tongyi:
  BaseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
  ApiKey: "${DASHSCOPE_API_KEY}"
  Model: text-embedding-v3
  Dims: 1024
  BatchSize: 25
  TimeoutMs: 30000

Es:
  Addrs:
  - http://127.0.0.1:9200
  TimeoutMs: 10000

RagIndex: zhiguang_rag_vector

LlmRateLimit:
  RedisHost: 127.0.0.1:6379
  DescribeCapacity: 5
  DescribeRefillPerSec: 1
  QaCapacity: 3
  QaRefillPerSec: 1

Log:
  ServiceName: llm-rpc
  Mode: console
  Level: info
