Name: knowpost-api
Host: 0.0.0.0
Port: 8005

Mode: dev

AuthRpc:
  Endpoints:
  - 127.0.0.1:9002
  NonBlock: true

KnowPostRpc:
  Endpoints:
  - 127.0.0.1:9004
  NonBlock: true

